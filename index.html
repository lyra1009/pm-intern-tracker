<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>27届PM实习生阶段跟踪看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.lock-box{background:white;border-radius:16px;padding:40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:380px;max-width:90vw;}
.lock-box .icon{font-size:48px;margin-bottom:12px;}
.lock-box h2{font-size:20px;color:#333;margin-bottom:4px;}
.lock-box .sub{font-size:13px;color:#999;margin-bottom:24px;}
.lock-box input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:10px;font-size:16px;text-align:center;outline:none;font-family:inherit;}
.lock-box input:focus{border-color:#6366f1;}
.lock-box .err{color:#ef4444;font-size:13px;margin-top:10px;display:none;}
.lock-box button{width:100%;margin-top:16px;padding:12px;background:#6366f1;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.lock-box button:hover{background:#4f46e5;}
.lock-box .hint{font-size:11px;color:#999;margin-top:16px;}
</style>
</head>
<body>
<div class="lock-box">
    <div class="icon">🔐</div>
    <h2>27届PM实习生阶段跟踪</h2>
    <p class="sub">请输入密码查看</p>
    <input type="password" id="pwd" placeholder="请输入密码" onkeydown="if(event.key==='Enter')checkAuth()" autofocus>
    <div class="err" id="err">密码错误，请重试</div>
    <button onclick="checkAuth()">进入看板</button>
    <p class="hint">仅限内部使用，请勿外传</p>
</div>
<script src="auth.js"></script>
</body>
</html>
