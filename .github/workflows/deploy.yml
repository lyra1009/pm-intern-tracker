name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Inject secrets
        run: |
          # 将密码注入到 auth.js
          sed -i "s/{{SITE_PASSWORD}}/${{ secrets.SITE_PASSWORD }}/g" auth.js
          
          # 验证注入成功（隐藏密码）
          if grep -q "{{SITE_PASSWORD}}" auth.js; then
            echo "错误：密码注入失败"
            exit 1
          fi
          echo "密码注入成功"
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
